worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log notice;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # =========================
    # RESOLVEDOR DNS DE DOCKER
    # =========================
    resolver 127.0.0.11 valid=30s ipv6=off;

    # =========================
    # UPSTREAMS (con zona compartida para resolución dinámica)
    # =========================
    upstream api_servers {
        least_conn;
        zone api_servers 64k;  # ← Zona de memoria compartida (CRÍTICA)
        server api:3000 resolve max_fails=3 fail_timeout=30s;
    }

    upstream search_servers {
        least_conn;
        zone search_servers 64k;  # ← Zona de memoria compartida
        server search-service:3001 resolve max_fails=3 fail_timeout=30s;
    }

    # =========================
    # SERVER
    # =========================
    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log info;

        # =========================
        # HEADERS GLOBAL
        # =========================
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Gateway "nginx" always;

        # =========================
        # DEBUG (ver contenedor real)
        # =========================
        location /_host {
            proxy_pass http://api_servers/_host;
        }

        location /search/_host {
            proxy_pass http://search_servers/_host;
        }

        # =========================
        # API
        # =========================
        location /api/ {
            proxy_pass http://api_servers/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Swagger API
        location /api/docs/ {
            proxy_pass http://api_servers/api/docs/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        location /api/openapi.json {
            proxy_pass http://api_servers/api/openapi.json;
            proxy_http_version 1.1;
        }

        # =========================
        # SEARCH SERVICE
        # =========================
        location /search/ {
            proxy_pass http://search_servers/search/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /search/docs/ {
            proxy_pass http://search_servers/search/docs/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        location /search/openapi.json {
            proxy_pass http://search_servers/search/openapi.json;
            proxy_http_version 1.1;
        }

        # =========================
        # HEALTH CHECKS
        # =========================
        location /health {
            proxy_pass http://api_servers/health;
            proxy_http_version 1.1;
            access_log off;
        }

        location /search-health {
            proxy_pass http://search_servers/health;
            proxy_http_version 1.1;
            access_log off;
        }

        # =========================
        # ROOT → API
        # =========================
        location / {
            proxy_pass http://api_servers/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}